<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Christian Wilfredo — Information Systems & Technology student. Explore my IT projects and personal life journey.">
  <title>Christian Wilfredo | Portfolio</title>
  <link rel="stylesheet" href="css/style.css">
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>

  <!-- Floating Name -->
  <div class="landing-name">
    <h1>Christian Wilfredo</h1>
    <div class="tagline">Information Systems &amp; Technology</div>
  </div>

  <!-- Split Screen Container -->
  <div class="landing-container" id="landingContainer">

    <!-- Left Panel — IT Projects -->
    <div class="panel panel-it" id="panelIT" data-target="projects.html">
      <div class="panel-content">
        <div class="panel-icon">
          <i data-lucide="code-2"></i>
        </div>
        <h2 class="panel-title">Projects</h2>
        <p class="panel-subtitle">Web · IoT · Systems</p>
        <div class="panel-cta">
          <span>Explore</span>
          <span class="arrow">→</span>
        </div>
      </div>
    </div>

    <!-- Right Panel — Life -->
    <div class="panel panel-life" id="panelLife" data-target="life.html">
      <div class="panel-content">
        <div class="panel-icon">
          <i data-lucide="heart"></i>
        </div>
        <h2 class="panel-title">Life</h2>
        <p class="panel-subtitle">Sports · Organizations</p>
        <div class="panel-cta">
          <span>Discover</span>
          <span class="arrow">→</span>
        </div>
      </div>
    </div>

  </div>

  <!-- Social Links Bar -->
  <div class="social-bar">
    <a href="https://github.com/" target="_blank" rel="noopener" aria-label="GitHub">
      <i data-lucide="github"></i>
    </a>
    <a href="https://linkedin.com/" target="_blank" rel="noopener" aria-label="LinkedIn">
      <i data-lucide="linkedin"></i>
    </a>
    <a href="https://instagram.com/" target="_blank" rel="noopener" aria-label="Instagram">
      <i data-lucide="instagram"></i>
    </a>
    <a href="mailto:hello@example.com" aria-label="Email">
      <i data-lucide="mail"></i>
    </a>
  </div>

  <!-- Page Transition Overlay -->
  <div class="page-transition-overlay" id="transitionOverlay"></div>

  <script src="js/main.js"></script>
</body>
</html>
